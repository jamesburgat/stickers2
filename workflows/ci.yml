name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Optional dev tools (safe even if you don't use them yet)
          pip install ruff

      - name: Lint (ruff)
        run: |
          ruff --version
          # If you don't have ruff config yet, this is a reasonable default:
          ruff check .

      - name: Basic import check
        run: |
          python -c "import sys; print(sys.version)"
          # Change "app" to your entrypoint module if different (e.g. server.py)
          python -c "import app; print('Imported app OK')"
