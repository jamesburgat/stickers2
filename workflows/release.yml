name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source tarball
        run: |
          REPO="${{ github.event.repository.name }}"
          TAG="${{ github.ref_name }}"
          mkdir -p dist
          tar \
            --exclude=".git" \
            --exclude="dist" \
            --exclude="__pycache__" \
            --exclude="*.pyc" \
            -czf "dist/${REPO}-${TAG}.tar.gz" .

      - name: Create GitHub Release + upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
